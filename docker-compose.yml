version: '3'

services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
     KAFKA_NODE_ID: 1
     KAFKA_PROCESS_ROLES: broker,controller

     KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

     KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093

     KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092

     KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

     KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
     KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
     KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
     KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

     CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: energy_analytics_db
    environment:
      - POSTGRES_USER=energy_user
      - POSTGRES_PASSWORD=energy_pass
      - POSTGRES_DB=energy_analytics
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
volumes:
  timescaledb_data:
