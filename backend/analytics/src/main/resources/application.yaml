spring:
  application:
    name: analytics

  datasource:
    url: jdbc:postgresql://localhost:5432/energy_analytics
    username: energy_user
    password: energy_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      jdbc.batch_size: 50
      order_inserts: true
      order_updates: true
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: energy-analytics-group
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.features.allow_non_numeric_numbers: true
        spring.json.value.default.type: com.energy.analytics.dto.ingestion.RawEnergyEventDTO
        spring.json.trusted.packages: "com.energy.analytics.dto"
        spring.json.type.mapping: >
          grid:com.energy.analytics.dto.ingestion.RawEnergyEventDTO,
          flows:com.energy.analytics.dto.ingestion.CrossborderFlowEventDTO

  jackson:
    parser:
      allow-non-numeric-numbers: true