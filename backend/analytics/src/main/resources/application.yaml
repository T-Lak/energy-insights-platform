spring:
  application:
    name: analytics

  datasource:
    url: jdbc:postgresql://localhost:5432/energy_analytics
    username: energy_user
    password: energy_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      jdbc.batch_size: 50
      order_inserts: true
      order_updates: true
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: energy-analytics-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: "com.energy.analytics.dto.RawEnergyEventDTO"
        spring.json.trusted.packages: "com.energy.analytics.model"