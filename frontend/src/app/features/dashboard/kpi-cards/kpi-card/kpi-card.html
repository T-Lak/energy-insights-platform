<div class="card-wrapper">
  <div class="kpi-title">
    {{ config[type].label }}
    <span class="material-icons">info_outline</span>
  </div>

  <div class="kpi-content">
    <div class="kpi-value">
      <span>{{ currentKpiValue$ | async }}</span>
      {{ config[type].unit }}
    </div>

    <div class="kpi-trend">
      <span class="material-icons">arrow_outward</span>
      1.2%
    </div>
  </div>
</div>
