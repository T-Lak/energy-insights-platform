<div class="kpi-section-wrapper">
  @if (streams$ | async; as allStreams) {
    @for (kpiType of kpiList; track $index) {
      <app-kpi-card
        [type]="kpiType"
        [stream]="allStreams[kpiType]"
        [tooltipDescription]="tooltipDescriptions[$index]"
        tooltipStyleClass="kpi-tooltip-theme"
      />
    }
  }
</div>
