<div class="map-wrapper">
  <div class="header">
    <span class="material-icons">call_split</span>
    Crossborder Flows
  </div>
  <div class="map-container-relative">
    <div id="map"></div>
    @if (isLoading$ | async) {
      <div class="map-loading-overlay">
        <p-progressSpinner
          strokeWidth="4"
          fill="transparent"
          animationDuration=".8s"
          ariaLabel="loading"
        >
        </p-progressSpinner>
        <span>Loading geospatial grid layers...</span>
      </div>
    }
  </div>
</div>
