<app-subpage-header title="Renewable Share" icon="eco" />

<div class="content-wrapper">
  <div class="toolbar-wrapper">
    <p-date-picker
      class="date-picker"
      [(ngModel)]="selectedDate"
      (onSelect)="onDateChange($event)"
      [showIcon]="true"
      [maxDate]="maxDate"
      placeholder="Select Date"
      size="small"
      [autoZIndex]="false"
      appendTo="body"
    />
    <button
      pButton
      [disabled]="prevBtnDisabled"
      (click)="onPreviousDayBtnClicked()"
      size="small"
      severity="secondary"
    >
      Prev Day
    </button>
    <button
      pButton
      [disabled]="nextBtnDisabled"
      (click)="onNextDayBtnClicked()"
      size="small"
      severity="secondary"
    >
      Next Day
    </button>
    <button
      pButton
      [disabled]="todayBtnDisabled"
      (click)="onTodayBtnClicked()"
      size="small"
      severity="contrast"
    >
      Today
    </button>
  </div>

  <div class="charts-wrapper">
    <div class="chart-wrapper donut">
      <div class="header">
        <span class="material-icons">wb_twilight</span> Day / Night Mix Comparison
      </div>
      <div class="chart-container position-relative">
        @if (isLoading$ | async) {
          <div class="spinner-overlay">
            <p-progressSpinner strokeWidth="8" animationDuration="1s" />
          </div>
        }
        @if (dailySummaries$ | async; as data) {
          <app-multi-donut-chart [dataInput]="data" />
        }
      </div>
    </div>

    <div class="chart-wrapper area">
      <div class="header"><span class="material-icons">area_chart</span> Daily Renewable Share</div>
      <div class="chart-container position-relative">
        @if (isLoading$ | async) {
          <div class="spinner-overlay">
            <p-progressSpinner strokeWidth="8" animationDuration="1s" />
          </div>
        }
        <app-stacked-area-chart [data]="(dailyRenewableMix$ | async) ?? []" />
      </div>
    </div>
  </div>

  <div class="table-wrapper">
    <div class="header">
      <span class="material-icons">table_chart</span> Renewable Generation Breakdowns
    </div>

    @if (!(isLoading$ | async)) {
      <div class="table-container">
        <app-ag-table
          [columnDefs]="tableColumnDefinitions"
          [dataInput]="(tableData$ | async) ?? []"
        />
      </div>
    } @else {
      <div class="table-container table-skeleton-layout">
        <p-skeleton width="100%" height="42px" styleClass="mb-3" borderRadius="4px" />
        <p-skeleton width="100%" height="32px" styleClass="mb-2" borderRadius="4px" />
        <p-skeleton width="100%" height="32px" styleClass="mb-2" borderRadius="4px" />
        <p-skeleton width="100%" height="32px" styleClass="mb-2" borderRadius="4px" />
        <p-skeleton width="100%" height="32px" styleClass="mb-2" borderRadius="4px" />
        <p-skeleton width="100%" height="32px" styleClass="mb-2" borderRadius="4px" />
        <p-skeleton width="100%" height="32px" styleClass="mb-2" borderRadius="4px" />
        <p-skeleton width="100%" height="32px" styleClass="mb-2" borderRadius="4px" />
      </div>
    }
  </div>
</div>
