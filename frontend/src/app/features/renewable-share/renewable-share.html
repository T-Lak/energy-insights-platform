<app-subpage-header title="Renewable Share" icon="eco" />

<div class="content-wrapper">
  <div class="toolbar-wrapper">
    <p-date-picker
      class="date-picker"
      [(ngModel)]="selectedDate"
      (onSelect)="onDateChange($event)"
      [showIcon]="true"
      [placeholder]="'Select Date'"
      [autoZIndex]="false"
      [baseZIndex]="2000"
    ></p-date-picker>
  </div>
  <div class="charts-wrapper">
    <div class="bar-chart-wrapper"></div>
    <div class="stacked-area-chart-wrapper">
      <app-stacked-area-chart [data]="(dailyRenewableMix$ | async) ?? []" />
    </div>
  </div>
</div>
