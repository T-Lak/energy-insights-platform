components:
  schemas:
    # Main Responses
    RegionalFlowTotalsTimeline:
      type: object
      properties:
        region: { type: string }
        generatedAt: { type: string, format: date-time }
        flowTotals:
          type: array
          items: { $ref: "#/components/schemas/FlowTotalsDTO" }
          
    CrossborderFlowsOverview:
      type: object
      properties:
        hourlyFlowPoints:
          type: array
          items: { $ref: "#/components/schemas/FlowGridEdgeDTO" }
        flowTotals:
          type: array
          items: { $ref: "#/components/schemas/FlowTotalsDTO" }
        countrySummaries:
          type: array
          items: { $ref: "#/components/schemas/CountryFlowMetricsDTO" }

    LatestFlowsSnapshot:
      type: object
      properties:
        flowPoints:
          type: array
          items: { $ref: "#/components/schemas/FlowGridEdgeDTO" }

    DashboardSummarySnapshot:
      type: object
      properties:
        renewableShare: { $ref: "#/components/schemas/TimeseriesPointDTO" }
        carbonIntensity: { $ref: "#/components/schemas/TimeseriesPointDTO" }
        totalLoad: { $ref: "#/components/schemas/TimeseriesPointDTO" }
        netBalance: { $ref: "#/components/schemas/TimeseriesPointDTO" }

    DashboardLeaderboardOverview:
      type: object
      properties:
        energy: { type: array, items: { $ref: "#/components/schemas/SourceContribution" } }
        carbon: { type: array, items: { $ref: "#/components/schemas/SourceContribution" } }

    # Data Transfer Objects (DTOs)
    RenewableMixPointDTO:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        solar: { type: number, format: double }
        windOnshore: { type: number, format: double }
        windOffshore: { type: number, format: double }
        biomass: { type: number, format: double }
        hydro: { type: number, format: double }
        geothermal: { type: number, format: double }
        otherRenewable: { type: number, format: double }

    EnergyCategoryBreakdownDTO:
      type: object
      properties:
        timePeriod: { type: string }
        category: { type: string }
        amount: { type: number, format: double }
        metricPoints: { type: array, items: { $ref: "#/components/schemas/SourceContributionPointDTO" } }

    RenewableSourceMetricsDTO:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        source: { type: string }
        region: { type: string }
        avgGenerationMW: { type: number, format: double }
        change1hPercentage: { type: number, format: double }
        change24hPercentage: { type: number, format: double }

    # Skeleton for nested objects 
    FlowTotalsDTO: { type: object }
    FlowGridEdgeDTO: { type: object }
    CountryFlowMetricsDTO: { type: object }
    TimeseriesPointDTO: { type: object }
    SourceContribution: { type: object }
    SourceContributionPointDTO: { type: object }
