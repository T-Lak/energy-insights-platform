name: Energy Insights Platform CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/ingestion/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/ingestion/**'

jobs:
  test-ingestion:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend/ingestion
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest pytest-mock

      - name: Run Tests
        run: |
          cd backend/ingestion
          python -m pytest
  test-analytics:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'backend/analytics')

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Run Tests
        run: |
          cd backend/analytics
          ./mvnw clean test
