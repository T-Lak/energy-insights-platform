name: Energy Insights Platform CD

on:
  workflow_run:
    workflows: ["Energy Insights Platform CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy application files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,backend,frontend,nginx,api,assets,docker"
          target: /opt/gridpulse

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/gridpulse

            echo "${{ secrets.DB_PASSWORD }}" > secrets/db_password
            echo "${{ secrets.ENTSOE_API_KEY }}" > secrets/entsoe_api_key
            echo "${{ secrets.INGESTION_API_KEY }}" > secrets/ingestion_api_key

            chmod 600 secrets/*

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.prod.yml \
              up -d --build
